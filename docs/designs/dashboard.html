  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
      line-height: 1;
      text-transform: none;
      letter-spacing: normal;
      word-wrap: normal;
      white-space: nowrap;
      direction: ltr;
    }

    body {
      background-color: #F9F7F2;
      color: #1D1C16;
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
    }

    .progress-ring__circle {
      transition: stroke-dashoffset 0.35s;
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
    }
  </style>

<body class="font-body-md pb-32">
  <!-- TopAppBar -->
  <header
    class="fixed top-0 left-0 w-full z-50 bg-paper-warm/80 backdrop-blur-md flex justify-between items-center px-margin-mobile py-4 border-b border-surface-container">
    <div class="flex items-center gap-3">
      <span class="material-symbols-outlined text-accent-terracotta" data-icon="sync">sync</span>
      <h1 class="font-headline-md text-xl font-medium text-ink-primary">Claude Token Tracker</h1>
    </div>
    <button class="hover:opacity-70 transition-opacity">
      <span class="material-symbols-outlined text-outline" data-icon="account_circle">account_circle</span>
    </button>
  </header>
  <main class="mt-24 px-margin-mobile max-w-2xl mx-auto space-y-gutter">
    <!-- Next Reset Section -->
    <section
      class="flex flex-col items-center justify-center py-10 bg-surface-container-lowest rounded-xl border border-surface-container shadow-sm">
      <span class="font-label-sm text-ink-secondary mb-8 uppercase tracking-[0.1em]">Next Reset In</span>
      <div class="relative flex items-center justify-center w-64 h-64">
        <!-- Circular Progress Ring -->
        <svg class="w-full h-full">
          <circle class="text-surface-container" cx="128" cy="128" fill="transparent" r="122" stroke="currentColor"
            stroke-width="2"></circle>
          <circle class="text-accent-terracotta progress-ring__circle" cx="128" cy="128" fill="transparent"
            id="progress-circle" r="122" stroke="currentColor" stroke-dasharray="766.5" stroke-dashoffset="191.6"
            stroke-linecap="round" stroke-width="2.5"
            style="stroke-dasharray: 766.549, 766.549; stroke-dashoffset: 766.549;"></circle>
        </svg>
        <div class="absolute flex flex-col items-center">
          <input type="text" id="timer-display"
            class="text-5xl font-medium tracking-tight text-ink-primary bg-transparent border-none text-center focus:ring-2 focus:ring-accent-terracotta/20 rounded-lg w-40"
            value="02:51">
          <span class="font-label-md text-ink-secondary mt-1">remaining</span>
        </div>
      </div>
      <button
        class="mt-10 bg-accent-terracotta text-white px-8 py-3.5 rounded-full font-label-md font-semibold hover:brightness-105 active:scale-[0.98] transition-all flex items-center gap-2 shadow-sm shadow-accent-terracotta/20"
        id="reset-button">
        <span class="material-symbols-outlined text-[20px]" data-icon="play_circle">play_circle</span>
        Start/Update Tracker
      </button>
    </section>
    <!-- Main Cards Grid -->
    <section class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
      <!-- 5-Hour Window Card -->
      <div
        class="p-6 rounded-xl bg-surface-container-low border border-surface-container shadow-sm flex flex-col justify-between min-h-[140px]">
        <div class="flex justify-between items-start">
          <div class="flex flex-col">
            <span class="font-headline-md text-lg text-ink-primary">5-Hour Window</span>
            <div class="flex items-center gap-1.5 mt-1">
              <span class="material-symbols-outlined text-[14px] text-ink-secondary"
                data-icon="schedule">schedule</span>
              <span class="font-label-sm text-ink-secondary">Rolling period</span>
            </div>
          </div>
          <span
            class="bg-surface-container-highest text-ink-primary font-label-sm px-2.5 py-0.5 rounded-full">ACTIVE</span>
        </div>
        <div class="mt-6">
          <div class="flex items-baseline gap-1">
            <span class="font-display-lg text-2xl text-ink-primary">42</span><button
              class="ml-2 hover:text-accent-terracotta transition-colors flex items-center"><span
                class="material-symbols-outlined text-[16px] text-outline" data-icon="edit">edit</span></button>
            <span class="font-body-md text-ink-secondary">/ 50 messages</span>
          </div>
          <div class="w-full h-1.5 bg-surface-container rounded-full mt-3 overflow-hidden">
            <div class="h-full bg-accent-terracotta rounded-full w-[84%]"></div>
          </div>
        </div>
      </div>
      <!-- Weekly Reset Card -->
      <div
        class="p-6 rounded-xl bg-surface-container-low border border-surface-container shadow-sm flex flex-col justify-between min-h-[140px] relative">
        <div class="flex justify-between items-start">
          <div class="flex flex-col">
            <span class="font-headline-md text-lg text-ink-primary">Weekly Reset</span>
            <div class="flex items-center gap-1.5 mt-1">
              <span class="material-symbols-outlined text-[14px] text-ink-secondary"
                data-icon="calendar_today">calendar_today</span>
              <span class="font-label-sm text-ink-secondary">Sunday 12:00 AM</span>
            </div>
          </div>
          <button class="hover:text-accent-terracotta transition-colors">
            <span class="material-symbols-outlined text-[18px] text-outline" data-icon="edit">edit</span>
          </button>
        </div>
        <div class="mt-6">
          <div class="flex items-center gap-2">
            <div class="flex items-baseline gap-1"><span class="font-display-lg text-2xl text-ink-primary">4</span><span
                class="font-body-md text-ink-secondary">Days left</span></div><button
              class="hover:text-accent-terracotta transition-colors"><span
                class="material-symbols-outlined text-[16px] text-outline" data-icon="edit">edit</span></button>
          </div>
        </div>
      </div>
    </section>
    <!-- Decorative Aesthetic Element -->

      </div>
    </div>
  </main>
  <!-- BottomNavBar -->
  <nav
    class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-3 bg-paper-warm border-t border-surface-container">
    <!-- Dashboard (Active) -->
    <a class="flex flex-col items-center justify-center gap-1 text-accent-terracotta px-4 py-1" href="#">
      <span class="material-symbols-outlined" data-icon="dashboard"
        style="font-variation-settings: 'FILL' 1;">dashboard</span>
      <span class="font-label-sm">Dashboard</span>
    </a>
    <!-- History -->
    <a class="flex flex-col items-center justify-center gap-1 text-ink-secondary px-4 py-1 hover:text-ink-primary transition-colors"
      href="#">
      <span class="material-symbols-outlined" data-icon="history">history</span>
      <span class="font-label-sm">History</span>
    </a>
    <!-- Settings -->
    <a class="flex flex-col items-center justify-center gap-1 text-ink-secondary px-4 py-1 hover:text-ink-primary transition-colors"
      href="#">
      <span class="material-symbols-outlined" data-icon="settings">settings</span>
      <span class="font-label-sm">Settings</span>
    </a>
  </nav>
  <script>
    const timerDisplay = document.getElementById('timer-display');
    const progressCircle = document.getElementById('progress-circle');
    const radius = 122;
    const circumference = radius * 2 * Math.PI;

    let totalSeconds = (2 * 60) + 53;
    const initialTotal = 5 * 60 * 60;

    function setProgress(percent) {
      const offset = circumference - (percent / 100 * circumference);
      progressCircle.style.strokeDashoffset = offset;
    }

    function updateTimer() {
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;

      timerDisplay.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

      const percentage = (totalSeconds / initialTotal) * 100;
      setProgress(percentage);

      if (totalSeconds > 0) {
        totalSeconds--;
      }
    }

    setInterval(updateTimer, 1000);

    const resetBtn = document.getElementById('reset-button');
    resetBtn.addEventListener('click', () => {
      totalSeconds = 5 * 60 * 60;
      alert('Claude limit reset confirmed. Countdown initiated.');
    });

    progressCircle.style.strokeDasharray = `${circumference} ${circumference}`;
    setProgress((totalSeconds / initialTotal) * 100);
  </script>


</body>

</html>
